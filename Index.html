<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photobox</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Playfair+Display:ital@0;1&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #faf7f2;
      --parchment: #f2ece0;
      --sage: #8a9e85;
      --sage-light: #c8d5c4;
      --sage-dark: #5a7055;
      --mist: #d4ddd2;
      --ink: #3a3530;
      --ink-light: #7a7068;
      --dusty-rose: #c4a89a;
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--cream);
      color: var(--ink);
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 5rem 2rem 3rem;
      position: relative;
    }

    header::after {
      content: '';
      display: block;
      width: 1000px;
      height: 2px;
      background: var(--sage);
      margin: 2rem auto 0;
      opacity: 0.6;
    }

    .header-eyebrow {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--sage-dark);
      margin-bottom: 1rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(2rem, 3.5vw, 2.8rem);
      font-weight: 400;
      color: var(--ink);
      line-height: 1.1;
      letter-spacing: -0.01em;
    }

    .header-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.2rem;
      color: var(--ink-light);
      margin-top: 0.75rem;
    }

    /* ── Gallery grid ── */
    .gallery {
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 2rem 6rem;
      columns: 3 280px;
      column-gap: 1.25rem;
    }

    .photo-item {
      break-inside: avoid;
      margin-bottom: 1.25rem;
      position: relative;
      overflow: hidden;
      border-radius: 3px;
      cursor: pointer;
    }

    .photo-item img {
      width: 100%;
      display: block;
      transition: transform 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  filter 0.45s ease;
      filter: saturate(0.9) brightness(1.02);
    }

    .photo-item:hover img {
      transform: scale(1.04);
      filter: saturate(1.05) brightness(1.05);
    }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(40, 37, 33, 0.93);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 2rem;
      animation: fadeIn 0.3s ease;
    }

    #lightbox.open {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    #lightbox-img {
      max-width: min(94vw, 1200px);
      max-height: 88vh;
      object-fit: contain;
      border-radius: 2px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
      animation: slideUp 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    @keyframes slideUp {
      from { transform: translateY(18px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    #lightbox-caption {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: rgba(255,255,255,0.7);
      margin-top: 1.25rem;
      text-align: center;
    }

    #lightbox-counter {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.35);
      margin-top: 0.5rem;
    }

    /* Lightbox controls */
    .lb-btn {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.7);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
      line-height: 1;
    }

    .lb-btn:hover {
      background: rgba(255,255,255,0.18);
      color: #fff;
    }

    #lb-prev { left: 1.5rem; }
    #lb-next { right: 1.5rem; }

    #lb-close {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      font-size: 1.75rem;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s, transform 0.2s;
    }

    #lb-close:hover {
      color: #fff;
      transform: rotate(90deg);
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 2.5rem;
      border-top: 1px solid var(--mist);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.9rem;
      color: var(--ink-light);
    }

    /* ── Instructions banner (remove when deploying) ── */
    .instructions {
      background: var(--parchment);
      border: 1px dashed var(--sage);
      border-radius: 6px;
      max-width: 700px;
      margin: 0 auto 2rem;
      padding: 1.5rem 2rem;
      font-size: 0.875rem;
      line-height: 1.7;
      color: var(--ink);
    }
    .instructions strong { font-weight: 400; color: var(--sage-dark); }
    .instructions code {
      background: rgba(138,158,133,0.15);
      padding: 0.1em 0.4em;
      border-radius: 3px;
      font-family: monospace;
      font-size: 0.85em;
    }

    @media (max-width: 600px) {
      .gallery { columns: 2 160px; column-gap: 0.75rem; }
      .gallery { padding: 2rem 1rem 4rem; }
      .lb-btn { display: none; }
      h1 { font-size: 2.2rem; }
    }
  </style>
</head>

  <!-- Lightbox -->
  <div id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
    <button id="lb-close" aria-label="Close">&times;</button>
    <button class="lb-btn" id="lb-prev" aria-label="Previous photo">&#8249;</button>
    <img id="lightbox-img" src="" alt="" />
    <p id="lightbox-caption" style="display:none"></p>
    <p id="lightbox-counter" style="display:none"></p>
    <button class="lb-btn" id="lb-next" aria-label="Next photo">&#8250;</button>
  </div>

    &ldquo; to wander is to find &rdquo;
  </footer>

  <script>
    const items = Array.from(document.querySelectorAll('.photo-item')).sort((a, b) => {
      const numA = parseInt(a.querySelector('img').src.match(/photo(\d+)/)?.[1] ?? 0, 10);
      const numB = parseInt(b.querySelector('img').src.match(/photo(\d+)/)?.[1] ?? 0, 10);
      return numA - numB;
    });
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lightbox-img');
    const lbCap = document.getElementById('lightbox-caption');
    const lbCount = document.getElementById('lightbox-counter');
    let current = 0;

    function open(index) {
      current = index;
      const item = items[index];
      const img = item.querySelector('img');
      lbImg.src = img.src;
      lbImg.alt = img.alt;
      lbCap.textContent = item.dataset.caption || '';
      lbCount.textContent = (index + 1) + ' / ' + items.length;
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
      lbImg.style.animation = 'none';
      void lbImg.offsetWidth;
      lbImg.style.animation = '';
    }

    function close() {
      lb.classList.remove('open');
      document.body.style.overflow = '';
    }

    function prev() { open((current - 1 + items.length) % items.length); }
    function next() { open((current + 1) % items.length); }

    items.forEach((item, i) => item.addEventListener('click', () => open(i)));
    document.getElementById('lb-close').addEventListener('click', close);
    document.getElementById('lb-prev').addEventListener('click', prev);
    document.getElementById('lb-next').addEventListener('click', next);

    lb.addEventListener('click', e => { if (e.target === lb) close(); });

    document.addEventListener('keydown', e => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape') close();
      if (e.key === 'ArrowLeft') prev();
      if (e.key === 'ArrowRight') next();
    });
  </script>
