<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>postcards</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sage: #5a7a54;
      --dusty-blue: #8fa3b1;
      --blush: #c9b5ac;
      --cream: #f5f2ee;
      --stone: #e8e4de;
      --ink: #3a3733;
      --muted: #8c8680;
      --light-muted: #7a7470;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    header {
      padding: 3rem 2.5rem 2rem;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      border-bottom: 1px solid var(--stone);
    }

    .site-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 2rem;
      letter-spacing: 0.05em;
      color: var(--ink);
    }

    .site-title em {
      font-style: italic;
      color: var(--sage);
    }

    .photo-count {
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--light-muted);
    }

    main {
      padding: 2.5rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .empty-state {
      text-align: center;
      padding: 6rem 2rem;
      display: none;
    }

    .empty-state p {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.25rem;
      color: var(--light-muted);
    }

    /* Masonry-style grid */
    .gallery-grid {
      columns: 3;
      column-gap: 1.25rem;
    }

    @media (max-width: 768px) {
      .gallery-grid { columns: 2; }
      header { padding: 2rem 1.5rem 1.5rem; }
      main { padding: 1.5rem; }
    }

    @media (max-width: 480px) {
      .gallery-grid { columns: 1; }
    }

    .photo-item {
      break-inside: avoid;
      margin-bottom: 1.25rem;
      position: relative;
      overflow: hidden;
      border-radius: 3px;
      cursor: pointer;
    }

    .photo-item img {
      width: 100%;
      display: block;
      transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      border-radius: 3px;
    }

    .photo-item:hover img {
      transform: scale(1.03);
    }

    .photo-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(58,55,51,0.35) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.35s ease;
      border-radius: 3px;
    }

    .photo-item:hover .photo-overlay {
      opacity: 1;
    }

    .photo-caption {
      position: absolute;
      bottom: 0.875rem;
      left: 1rem;
      right: 1rem;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.9rem;
      color: rgba(245,242,238,0.9);
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .photo-item:hover .photo-caption {
      opacity: 1;
      transform: translateY(0);
    }

    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(38,35,31,0.92);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      padding: 2rem;
    }

    .lightbox.open {
      opacity: 1;
      pointer-events: all;
    }

    .lightbox img {
      max-width: 90vw;
      max-height: 88vh;
      object-fit: contain;
      border-radius: 3px;
      transform: scale(0.96);
      transition: transform 0.3s ease;
    }

    .lightbox.open img {
      transform: scale(1);
    }

    .lightbox-close {
      position: absolute;
      top: 1.5rem;
      right: 1.75rem;
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(245,242,238,0.6);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .lightbox-close:hover { color: rgba(245,242,238,1); }

    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(245,242,238,0.5);
      font-size: 1.5rem;
      padding: 1rem;
      transition: color 0.2s;
    }

    .lightbox-nav:hover { color: rgba(245,242,238,0.9); }
    .lightbox-prev { left: 1rem; }
    .lightbox-next { right: 1rem; }

    footer {
      padding: 2rem 2.5rem;
      border-top: 1px solid var(--stone);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    footer p {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--light-muted);
    }

    /* Staggered fade-in */
    .photo-item {
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<header>
  <h1 class="site-title">post<em>cards</em></h1>
  <span class="photo-count" id="photoCount"></span>
</header>

<main>
  <div class="empty-state" id="emptyState">
    <p>no photos yet — check back soon</p>
  </div>
  <div class="gallery-grid" id="galleryGrid"></div>
</main>

<footer>
  <p>sending you something lovely</p>
</footer>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lbClose">close</button>
  <button class="lightbox-nav lightbox-prev" id="lbPrev">&#8592;</button>
  <img id="lbImg" src="" alt="" />
  <button class="lightbox-nav lightbox-next" id="lbNext">&#8594;</button>
</div>

<script>
  // =============================================
  // YOUR PHOTOS — edit this list to add/remove
  // Just paste Cloudinary URLs here!
  // =============================================
  const photos = [
    { url: "https://res.cloudinary.com/djjpn9lwp/image/upload/v1777571010/Screenshot_2026-04-30_at_7.42.47_PM_uxank0.png", caption: "" },
    { url: "https://res.cloudinary.com/djjpn9lwp/image/upload/v1777571010/Screenshot_2026-04-30_at_7.43.09_PM_iss0qc.png", caption: "" },
  ];
  // =============================================

  let currentIndex = 0;

  function buildGallery() {
    const grid = document.getElementById('galleryGrid');
    const empty = document.getElementById('emptyState');
    const count = document.getElementById('photoCount');

    if (photos.length === 0) {
      empty.style.display = 'block';
      count.textContent = '';
      return;
    }

    count.textContent = `${photos.length} photo${photos.length === 1 ? '' : 's'}`;

    photos.forEach((photo, i) => {
      const item = document.createElement('div');
      item.className = 'photo-item';
      item.style.animationDelay = `${i * 0.06}s`;

      const img = document.createElement('img');
      img.src = photo.url;
      img.alt = photo.caption || `Photo ${i + 1}`;
      img.loading = 'lazy';

      const overlay = document.createElement('div');
      overlay.className = 'photo-overlay';

      item.appendChild(img);
      item.appendChild(overlay);

      if (photo.caption) {
        const cap = document.createElement('div');
        cap.className = 'photo-caption';
        cap.textContent = photo.caption;
        item.appendChild(cap);
      }

      item.addEventListener('click', () => openLightbox(i));
      grid.appendChild(item);
    });
  }

  function openLightbox(index) {
    currentIndex = index;
    document.getElementById('lbImg').src = photos[index].url;
    document.getElementById('lbImg').alt = photos[index].caption || '';
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  function navigate(dir) {
    currentIndex = (currentIndex + dir + photos.length) % photos.length;
    const img = document.getElementById('lbImg');
    img.style.opacity = '0';
    setTimeout(() => {
      img.src = photos[currentIndex].url;
      img.alt = photos[currentIndex].caption || '';
      img.style.opacity = '1';
    }, 150);
  }

  document.getElementById('lbClose').addEventListener('click', closeLightbox);
  document.getElementById('lbPrev').addEventListener('click', () => navigate(-1));
  document.getElementById('lbNext').addEventListener('click', () => navigate(1));
  document.getElementById('lightbox').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeLightbox();
  });

  document.addEventListener('keydown', (e) => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') navigate(-1);
    if (e.key === 'ArrowRight') navigate(1);
  });

  buildGallery();
</script>
</body>
</html>
